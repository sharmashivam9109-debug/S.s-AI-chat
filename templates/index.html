<script>
let guestCount = 0;
let currentUser = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setTheme(t) {
  document.body.classList.toggle('light-mode', t==='light');
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('theme-'+t).classList.add('active');
}

function openDrawer() { 
  document.getElementById('drawer').classList.add('open'); 
  document.getElementById('overlay').classList.add('show'); 
}

function closeDrawer() { 
  document.getElementById('drawer').classList.remove('open'); 
  document.getElementById('overlay').classList.remove('show'); 
}

document.getElementById('overlay').onclick = closeDrawer;

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('open');
  document.getElementById('s-arrow').classList.toggle('open');
}

function showWall(hard) { 
  document.getElementById('limit-wall').classList.add('show'); 
}

function dismissWall() { 
  document.getElementById('limit-wall').classList.remove('show'); 
}

function switchWallTab(t) {
  document.querySelectorAll('.wall-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('wp-'+t).classList.add('active');
}

async function handleSend() {

  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();

  if(!text) return;

  if(!currentUser && guestCount >= 5) {
    showWall(true);
    return;
  }

  appendMsg('user', text);

  inp.value = '';

  try {

    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await res.json();

    appendMsg('ai', data.reply);

  } catch(err) {

    appendMsg('ai', "Server error");

  }

  if(!currentUser){
    guestCount++;
    updateGuestBar();
  }

}

function appendMsg(role, text) {

  const box = document.getElementById('chat-box');

  const wrap = document.createElement('div');

  wrap.className = 'msg-wrap ' + role;

  wrap.innerHTML =
  `<div class="av">${role==='user'?'U':'✦'}</div>
   <div class="msg">${text}</div>`;

  box.appendChild(wrap);

  box.scrollTop = box.scrollHeight;

}

function updateGuestBar() {

  document.getElementById('msgs-left').textContent = 5 - guestCount;

  for(let i=1;i<=5;i++){
    document.getElementById('p'+i)
    .classList.toggle('used',i<=guestCount);
  }

}

function googleLogin(){

  currentUser = {name:"Shivam"};

  document.getElementById('user-badge')
  .classList.add('show');

  document.getElementById('guest-bar')
  .classList.add('hide');

  dismissWall();

  showToast("Login Successful!");

}

function logout(){

  currentUser = null;
  guestCount = 0;

  document.getElementById('user-badge')
  .classList.remove('show');

  document.getElementById('guest-bar')
  .classList.remove('hide');

  updateGuestBar();

  showToast("Logged out");

}

function clearChats(){

  document.getElementById('chat-box').innerHTML = '';

  showToast("Chats cleared");

}
</script>
