<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.s AI | Gemini Unique</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0e0e11;
            --sidebar-bg: #18181c;
            --text: #f0f0f5;
            --border: #2d2d35;
            --input-bg: #1e1e24;
            --accent: #ffffff;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
        }

        body.light-mode {
            --bg: #ffffff;
            --sidebar-bg: #f0f4f9;
            --text: #1f1f1f;
            --border: #dde3ea;
            --input-bg: #f0f4f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* Sidebar - Gemini Style */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); height: 100%;
            position: fixed; left: -280px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 25px; border-right: 1px solid var(--border);
        }
        #sidebar.open { left: 0; }

        /* Unique Logo */
        .logo-area { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .logo-dot { width: 14px; height: 14px; background: var(--gemini-gradient); border-radius: 4px; transform: rotate(45deg); }

        .nav-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(255,255,255,0.1); font-weight: 600; }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .menu-icon { font-size: 24px; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .menu-icon:hover { opacity: 1; }

        #chat-wrap { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 35px; scroll-behavior: smooth; }
        
        /* Message Layout */
        .msg-row { display: flex; gap: 20px; width: 100%; animation: fadeIn 0.5s ease; }
        .user-row { flex-direction: row-reverse; }
        .user-msg { background: var(--input-bg); padding: 14px 22px; border-radius: 24px; border-bottom-right-radius: 4px; max-width: 80%; font-size: 15px; border: 1px solid var(--border); }
        .ai-msg { flex: 1; line-height: 1.8; font-size: 15px; color: var(--text); }
        .ai-avatar { width: 35px; height: 35px; background: var(--gemini-gradient); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

        /* Input Container */
        .input-container { padding: 10px 15% 30px; position: relative; }
        .input-box {
            background: var(--input-bg); border-radius: 35px; display: flex;
            align-items: center; padding: 10px 25px; gap: 15px; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: #555; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 16px; padding: 12px 0; }

        /* Gemini-style Clicker (Send Button) */
        .send-btn {
            width: 45px; height: 45px; border-radius: 50%; background: transparent;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; font-size: 22px; color: var(--text);
        }
        .send-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

        /* Incoming Mode Bar */
        #incognito-bar { 
            display: none; background: rgba(155, 114, 203, 0.15); 
            text-align: center; padding: 8px; font-size: 12px; color: #b388ff; border-bottom: 1px solid rgba(179, 136, 255, 0.2);
        }

        /* Soft Login Prompt */
        #login-prompt {
            display: none; padding: 18px; background: var(--sidebar-bg); border-top: 1px solid var(--border);
            text-align: center; font-size: 14px; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .login-btn-small { background: var(--text); color: var(--bg); padding: 6px 15px; border-radius: 20px; font-weight: 700; text-decoration: none; margin-left: 10px; font-size: 12px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900; backdrop-filter: blur(2px); }
        #overlay.active { display: block; }

        /* Markdown Code Styles */
        pre { background: #1a1a1e; padding: 15px; border-radius: 12px; margin: 15px 0; overflow-x: auto; border: 1px solid var(--border); }
        code { font-family: 'Fira Code', monospace; font-size: 13px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div class="logo-area"><div class="logo-dot"></div> S.s AI</div>
        
        <div class="nav-item active" onclick="setMode('pro')">✨ Professional Mode</div>
        <div class="nav-item" id="incog-toggle" onclick="setMode('incoming')">🕶️ Incoming Mode</div>
        
        <div style="margin: 30px 0 10px 10px; font-size: 11px; color: #555; letter-spacing: 1.5px;">SETTINGS</div>
        <div class="nav-item" onclick="toggleTheme()">🌓 Change Theme</div>
        <div class="nav-item" onclick="location.href='/logout'">🚪 Logout Session</div>
        
        <div style="position: absolute; bottom: 30px; width: calc(100% - 50px); font-size: 10px; color: #444; text-align: center;">
            S.s AI Unique v3.0 | 2026
        </div>
    </div>

    <div id="main-content">
        <div id="incognito-bar">🕶️ INCOMING MODE: Conversations are private and not saved to history.</div>
        
        <header>
            <div class="menu-icon" onclick="toggleSidebar()">☰</div>
            <div style="font-weight: 700; font-size: 18px; letter-spacing: -0.5px;">S.s AI</div>
            <div style="width: 40px;"></div>
        </header>

        <div id="chat-wrap">
            <div class="msg-row">
                <div class="ai-avatar"></div>
                <div class="ai-msg">Boltiye! Main S.s AI hoon. Aaj hum kya unique puchenge?</div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <span style="cursor:pointer; font-size: 20px;" onclick="startVoice()">🎙️</span>
                <input type="text" id="user-input" placeholder="Message S.s AI..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
                <div class="send-btn" id="send-btn" onclick="sendMessage()">➤</div>
            </div>
        </div>

        <div id="login-prompt">
            Free limit reached (5/5). 
            <a href="/" class="login-btn-small">LOGIN FOR UNLIMITED</a>
        </div>
    </div>

    <script>
        let msgCount = 0;
        let incomingMode = false;
        const isVerified = {{ 'true' if verified else 'false' }};

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            toggleSidebar();
        }

        function setMode(mode) {
            incomingMode = (mode === 'incoming');
            document.getElementById('incognito-bar').style.display = incomingMode ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            toggleSidebar();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            // Soft Limit Check
            if(!isVerified && msgCount >= 5) {
                document.getElementById('login-prompt').style.display = 'block';
                return;
            }

            const chatWrap = document.getElementById('chat-wrap');
            // User UI
            chatWrap.innerHTML += `<div class="msg-row user-row"><div class="user-msg">${text}</div></div>`;
            input.value = '';
            chatWrap.scrollTop = chatWrap.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, incoming: incomingMode })
                });
                
                const data = await response.json();
                
                // AI UI with Markdown
                const aiHTML = `
                    <div class="msg-row">
                        <div class="ai-avatar"></div>
                        <div class="ai-msg">${marked.parse(data.reply)}</div>
                    </div>`;
                chatWrap.innerHTML += aiHTML;
                
                // Highlight Code
                chatWrap.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                if(!isVerified) msgCount++;
                chatWrap.scrollTop = chatWrap.scrollHeight;

            } catch (err) {
                console.error("Error:", err);
            }
        }

        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voice not supported.");
            
            const rec = new SpeechRecognition();
            rec.lang = 'hi-IN';
            rec.onstart = () => { document.getElementById('user-input').placeholder = "Listening..."; };
            rec.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                sendMessage();
            };
            rec.start();
        }
    </script>
</body>
</html>
