<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.s AI Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0d0d; color: #fff; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; }
        .user { background: #7c3aed; align-self: flex-end; }
        .ai { background: #1e1e1e; align-self: flex-start; border: 1px solid #333; }
        #input-area { display: flex; padding: 10px; gap: 10px; background: #111; }
        #msg-input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 15px; }
        #send-btn { padding: 12px 20px; border-radius: 25px; border: none; background: #7c3aed; color: #fff; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div id="input-area">
        <input id="msg-input" type="text" placeholder="Type a message..." />
        <button id="send-btn">Send</button>
    </div>
    <script>
        const chatBox = document.getElementById("chat-box");
        const input = document.getElementById("msg-input");
        const btn = document.getElementById("send-btn");

        btn.onclick = async () => {
            const msg = input.value.trim();
            if (!msg) return;
            chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = "";
            const res = await fetch("/chat", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({message: msg}) });
            const data = await res.json();
            chatBox.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        input.addEventListener("keypress", e => { if (e.key === "Enter") btn.click(); });
    </script>
</body>
</html>
