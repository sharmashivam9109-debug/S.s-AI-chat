<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.s AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#111118;--card:#13131f;--border:rgba(255,255,255,0.06);
  --text:#e2e8f0;--muted:#475569;--muted2:#94a3b8;
  --accent:#7c3aed;--accent2:#a855f7;
  --input-bg:#13131f;--header-bg:#0a0a0f;--drawer-bg:#111118;--msg-user:#1e1535;
}
body.light-mode {
  --bg:#f8f7ff;--surface:#ffffff;--card:#f1f0ff;--border:rgba(0,0,0,0.08);
  --text:#1e1b4b;--muted:#6b7280;--muted2:#4b5563;
  --input-bg:#ffffff;--header-bg:#f8f7ff;--drawer-bg:#ffffff;--msg-user:#ede9fe;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;transition:background 0.3s,color 0.3s}

/* STATUS BAR */
#user-badge{display:none;align-items:center;gap:8px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);flex-shrink:0}
#user-badge.show{display:flex}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--text);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#badge-name{font-weight:500;color:var(--text)}
#logout-btn{margin-left:auto;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s}
#logout-btn:hover{background:var(--card);color:var(--text)}

/* GUEST BAR */
#guest-bar{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);flex-shrink:0;gap:8px}
#guest-bar.hide{display:none}
.guest-bar-left{display:flex;align-items:center;gap:8px}
.guest-pip{display:flex;gap:3px}
.pip{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background 0.3s}
.pip.used{background:var(--text)}
#guest-login-btn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted2);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.2s}
#guest-login-btn:hover{background:var(--card);color:var(--text)}

/* LIMIT WALL */
#limit-wall{display:none;position:fixed;inset:0;z-index:200;background:rgba(6,6,12,0.92);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:24px}
body.light-mode #limit-wall{background:rgba(240,237,255,0.92)}
#limit-wall.show{display:flex;animation:fade-up 0.4s cubic-bezier(0.22,1,0.36,1)}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.wall-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 0 80px rgba(124,58,237,0.12),0 40px 60px rgba(0,0,0,0.4)}
.wall-icon{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px;box-shadow:0 0 28px rgba(124,58,237,0.35);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.wall-card h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px}
.wall-card p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.wall-card p span{color:var(--accent2)}
.wall-tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:18px;gap:4px}
.wall-tab{flex:1;padding:9px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.wall-tab.active{background:var(--accent);color:#fff}
.wall-panel{display:none}
.wall-panel.active{display:block;animation:fade-in 0.25s ease}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.w-field{width:100%;padding:12px 14px;margin-bottom:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.w-field:focus{border-color:rgba(124,58,237,0.5)}
.w-field::placeholder{color:var(--muted)}
.w-row{display:flex;gap:8px;margin-bottom:10px}
.w-row .w-field{margin-bottom:0}
.otp-send-btn{padding:12px 14px;border-radius:12px;border:1px solid rgba(124,58,237,0.3);background:rgba(124,58,237,0.1);color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s}
.otp-send-btn:disabled{opacity:0.4;cursor:not-allowed}
.google-btn{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:10px}
.google-btn:hover{border-color:rgba(124,58,237,0.4)}
.w-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.w-submit:hover{transform:translateY(-1px)}
.w-skip{margin-top:14px;font-size:12px;color:var(--muted);cursor:pointer;display:block}
.w-skip:hover{color:var(--muted2)}
.w-err{font-size:12px;color:#f87171;margin-bottom:8px;display:none;text-align:left}
.w-err.show{display:block}

/* DRAWER */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
#overlay.show{display:block}
#drawer{position:fixed;left:-300px;top:0;width:280px;height:100%;background:var(--drawer-bg);z-index:100;display:flex;flex-direction:column;transition:left 0.3s ease;border-right:1px solid var(--border)}
#drawer.open{left:0}
.drawer-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.drawer-brand{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;display:block}
#drawer-new-chat{width:100%;padding:12px 16px;background:none;border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:background 0.2s;font-family:'DM Sans',sans-serif}
#drawer-new-chat:hover{background:var(--card)}
.drawer-section-label{padding:16px 16px 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
#drawer-history{flex:1;overflow-y:auto;padding:4px 8px}
.history-item{padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--muted2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:0.2s}
.history-item:hover{background:var(--card);color:var(--text)}
.history-item.active{background:rgba(124,58,237,0.12);color:var(--accent2)}

/* SETTINGS */
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background 0.2s;font-size:13px;color:var(--muted2)}
.settings-header:hover{background:var(--card);color:var(--text)}
.settings-arrow{transition:transform 0.25s;font-size:11px}
.settings-arrow.open{transform:rotate(180deg)}
#settings-body{display:none;flex-direction:column;gap:6px;padding:8px 12px 14px;background:var(--bg)}
#settings-body.open{display:flex}
.s-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:4px 2px 2px;margin-top:4px}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);gap:10px}
.s-label{font-size:13px;color:var(--text)}
.seg-btns{display:flex;gap:4px}
.seg-btn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s}
.seg-btn.active{border-color:var(--accent);background:rgba(124,58,237,0.12);color:var(--accent2);font-weight:600}
.toggle-sw{position:relative;width:36px;height:20px}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;border-radius:20px;background:var(--border);cursor:pointer;transition:0.25s;border:1px solid var(--border)}
.toggle-sw input:checked+.toggle-track{background:var(--accent)}
.toggle-track::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:0.25s}
.toggle-sw input:checked+.toggle-track::before{transform:translateX(16px)}

/* CHAT AREA */
#header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--header-bg)}
#toggle-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
.header-title{font-size:16px;font-weight:600;font-family:'Syne',sans-serif}
#chat-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column}
#chat-box{padding:24px 16px 8px;display:flex;flex-direction:column;gap:18px;max-width:760px;width:100%;margin:0 auto}
.msg-wrap{display:flex;gap:10px;align-items:flex-start}
.msg-wrap.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.user .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.ai .av{background:var(--card);border:1px solid rgba(124,58,237,0.25);color:var(--accent2)}
.msg{padding:11px 15px;border-radius:18px;font-size:14px;line-height:1.75}
.user .msg{background:var(--msg-user);border-bottom-right-radius:4px}
.ai .msg{background:transparent}

/* INPUT */
#input-wrap{padding:12px 16px 22px;background:var(--header-bg);border-top:1px solid var(--border)}
.input-inner{max-width:760px;margin:0 auto}
.input-box{display:flex;align-items:flex-end;gap:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:24px;padding:10px 14px}
#msg-input{flex:1;background:none;border:none;color:var(--text);font-size:15px;outline:none;resize:none;max-height:120px;font-family:inherit}
#send-btn{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:0.3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="user-badge">
  <div class="badge-dot"></div>
  <span id="badge-name">Logged in</span>
  <button id="logout-btn" onclick="logout()">Logout</button>
</div>

<div id="guest-bar">
  <div class="guest-bar-left">
    <div class="guest-pip">
      <div class="pip" id="p1"></div><div class="pip" id="p2"></div>
      <div class="pip" id="p3"></div><div class="pip" id="p4"></div><div class="pip" id="p5"></div>
    </div>
    <span>Guest &mdash; <b id="msgs-left">5</b> free messages</span>
  </div>
  <button id="guest-login-btn" onclick="showWall(false)">Login ✦</button>
</div>

<div id="limit-wall">
  <div class="wall-card">
    <div class="wall-icon">✦</div>
    <h2 id="wall-title">Limit Khatam!</h2>
    <p id="wall-desc">Unlimited chat ke liye login karein.</p>
    <div class="wall-tabs">
      <button class="wall-tab active" onclick="switchWallTab('google')">Google</button>
      <button class="wall-tab" onclick="switchWallTab('phone')">Phone</button>
      <button class="wall-tab" onclick="switchWallTab('email')">Email</button>
    </div>
    <div class="wall-panel active" id="wp-google">
      <button class="google-btn" onclick="googleLogin()">Continue with Google</button>
    </div>
    <div class="wall-panel" id="wp-phone">
      <input class="w-field" id="ph-num" placeholder="10-digit number">
      <button class="w-submit" onclick="sendOTP()">Send OTP</button>
    </div>
    <div class="wall-panel" id="wp-email">
      <input class="w-field" id="em-email" placeholder="Email">
      <input class="w-field" id="em-pass" type="password" placeholder="Password">
      <button class="w-submit" onclick="emailLogin()">Login</button>
    </div>
    <span class="w-skip" onclick="dismissWall()">Abhi nahi</span>
  </div>
</div>

<div id="overlay"></div>

<div id="drawer">
  <div class="drawer-top">
    <span class="drawer-brand">✦ S.s AI</span>
    <button id="drawer-new-chat">✎&nbsp; New chat</button>
  </div>
  <div id="drawer-history"></div>
  <div class="settings-header" onclick="toggleSettings()">
    <span>⚙️ Settings</span>
    <span class="settings-arrow" id="s-arrow">▼</span>
  </div>
  <div id="settings-body" class="open">
    <div class="s-section-title">🎨 Appearance</div>
    <div class="s-row">
      <div class="seg-btns">
        <button class="seg-btn active" id="theme-dark" onclick="setTheme('dark')">Dark</button>
        <button class="seg-btn" id="theme-light" onclick="setTheme('light')">Light</button>
      </div>
    </div>
  </div>
  <div class="drawer-footer">
    <button id="clear-btn" onclick="clearChats()">🗑 Clear all</button>
  </div>
</div>

<div id="header">
  <button id="toggle-btn" onclick="openDrawer()">☰</button>
  <span class="header-title">S.s AI</span>
  <div style="width:36px"></div>
</div>

<div id="chat-wrap"><div id="chat-box"></div></div>

<div id="input-wrap">
  <div class="input-inner">
    <div class="input-box">
      <textarea id="msg-input" rows="1" placeholder="Ask S.s AI..."></textarea>
      <button id="send-btn" onclick="handleSend()">➤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let guestCount = 0;
let currentUser = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setTheme(t) {
  document.body.classList.toggle('light-mode', t==='light');
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('theme-'+t).classList.add('active');
}

function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').onclick = closeDrawer;

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('open');
  document.getElementById('s-arrow').classList.toggle('open');
}

function showWall(hard) { document.getElementById('limit-wall').classList.add('show'); }
function dismissWall() { document.getElementById('limit-wall').classList.remove('show'); }

function switchWallTab(t) {
  document.querySelectorAll('.wall-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('wp-'+t).classList.add('active');
}

function handleSend() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if(!text) return;
  
  if(!currentUser && guestCount >= 5) { showWall(true); return; }
  
  appendMsg('user', text);
  inp.value = '';
  
  setTimeout(() => {
    appendMsg('ai', "Main ek AI hoon. Aapka swagat hai!");
    if(!currentUser) {
        guestCount++;
        updateGuestBar();
    }
  }, 1000);
}

function appendMsg(role, text) {
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  wrap.innerHTML = `<div class="av">${role==='user'?'U':'✦'}</div><div class="msg">${text}</div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function updateGuestBar() {
  document.getElementById('msgs-left').textContent = 5 - guestCount;
  for(let i=1; i<=5; i++) {
    document.getElementById('p'+i).classList.toggle('used', i <= guestCount);
  }
}

function googleLogin() {
  currentUser = { name: "Shivam" };
  document.getElementById('user-badge').classList.add('show');
  document.getElementById('guest-bar').classList.add('hide');
  dismissWall();
  showToast("Login Successful!");
}

function logout() {
  currentUser = null; guestCount = 0;
  document.getElementById('user-badge').classList.remove('show');
  document.getElementById('guest-bar').classList.remove('hide');
  updateGuestBar();
  showToast("Logged out");
}

function clearChats() {
  document.getElementById('chat-box').innerHTML = '';
  showToast("Chats cleared");
}
</script>
</body>
</html>
