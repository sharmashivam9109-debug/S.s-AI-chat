<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.S AI | Pro Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --card: #141414;
            --border: #262626;
            --text: #ffffff;
            --muted: #a1a1a1;
            --accent: #ffffff;
            --accent-text: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'DM Sans', sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* Status & Header */
        #status-bar { 
            padding: 10px 20px; 
            background: var(--surface); 
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            letter-spacing: 1px;
        }

        header {
            padding: 15px 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }

        /* Chat Area */
        #chat-wrap { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            scroll-behavior: smooth;
        }

        .msg-container { display: flex; flex-direction: column; gap: 5px; max-width: 85%; }
        .user-container { align-self: flex-end; }
        .ai-container { align-self: flex-start; width: 100%; }

        .msg { 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 14.5px; 
            line-height: 1.6; 
            word-wrap: break-word;
        }

        .user { background: var(--text); color: var(--bg); border-bottom-right-radius: 2px; font-weight: 500; }
        .ai { background: transparent; color: var(--text); border: none; padding-left: 0; }

        /* Markdown Styles */
        .ai pre { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; overflow-x: auto; border: 1px solid var(--border); }
        .ai code { font-family: 'Courier New', monospace; color: #d4d4d4; }
        .ai p { margin-bottom: 10px; }
        .ai ul, .ai ol { margin-left: 20px; margin-bottom: 10px; }

        /* Input Section */
        .input-area { padding: 20px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-box {
            max-width: 800px; margin: 0 auto;
            display: flex; gap: 12px; align-items: center;
            background: var(--card);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .input-box:focus-within { border-color: #555; }

        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 15px; }

        /* B&W Buttons */
        .bw-btn {
            background: var(--text); color: var(--bg);
            border: none; padding: 8px 18px; border-radius: 20px;
            font-weight: 700; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .bw-btn:hover { background: #ccc; }

        .icon-btn {
            background: none; border: none; color: var(--text);
            font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { transform: scale(1.1); }

        /* Security Wall */
        #limit-wall {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
        }
        .wall-content { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); max-width: 350px; }

        .typing { font-size: 12px; color: var(--muted); padding: 0 20px 10px; display: none; }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>S.S AI — SECURE SESSION</span>
        <span id="limit-info">LIMIT: 5 MESSAGES LEFT</span>
    </div>

    <header>
        <div class="logo">S.S AI</div>
        <button class="bw-btn" onclick="location.href='/logout'">LOGOUT</button>
    </header>

    <div id="chat-wrap">
        <div class="msg-container ai-container">
            <div class="msg ai">Boltiye, main S.S AI hoon. Aaj main aapki kya madad kar sakta hoon?</div>
        </div>
    </div>

    <div class="typing" id="typing">S.S AI is thinking...</div>

    <div class="input-area">
        <div class="input-box">
            <button class="icon-btn" id="mic-btn" onclick="startVoice()">🎙️</button>
            <input type="text" id="user-input" placeholder="Type or speak here..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="icon-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <div id="limit-wall">
        <div class="wall-content">
            <h1 style="font-family:Syne; margin-bottom:15px;">ACCESS LOCKED</h1>
            <p style="color:var(--muted); margin-bottom:25px; font-size:14px;">Aapki 5 free messages ki limit khatam ho chuki hai. Aage badhne ke liye login karein.</p>
            <button class="bw-btn" style="width:100%; padding:15px;" onclick="location.href='/'">LOGIN NOW</button>
        </div>
    </div>

    <script>
        let msgCount = 0;
        const isVerified = {{ 'true' if verified else 'false' }};

        // Focus input on load
        window.onload = () => document.getElementById('user-input').focus();

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            // Security Check
            if (!isVerified && msgCount >= 5) {
                document.getElementById('limit-wall').style.display = 'flex';
                return;
            }

            appendMsg(text, 'user');
            input.value = '';
            document.getElementById('typing').style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                document.getElementById('typing').style.display = 'none';

                if (data.reply) {
                    appendMsg(data.reply, 'ai');
                    if (!isVerified) {
                        msgCount++;
                        document.getElementById('limit-info').innerText = `LIMIT: ${5 - msgCount} MESSAGES LEFT`;
                    }
                } else if (data.error) {
                    document.getElementById('limit-wall').style.display = 'flex';
                }
            } catch (err) {
                document.getElementById('typing').style.display = 'none';
                appendMsg("Connection lost. Please refresh.", 'ai');
            }
        }

        function appendMsg(text, sender) {
            const chatWrap = document.getElementById('chat-wrap');
            const container = document.createElement('div');
            container.className = `msg-container ${sender}-container`;
            
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            
            if (sender === 'ai') {
                div.innerHTML = marked.parse(text);
                setTimeout(() => {
                    div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                }, 10);
            } else {
                div.innerText = text;
            }
            
            container.appendChild(div);
            chatWrap.appendChild(container);
            chatWrap.scrollTop = chatWrap.scrollHeight;
        }

        // Voice Input Function
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Browser not supported");

            const recognition = new SpeechRecognition();
            recognition.lang = 'hi-IN';
            const micBtn = document.getElementById('mic-btn');

            recognition.onstart = () => micBtn.innerText = '🔴';
            recognition.onresult = (event) => {
                document.getElementById('user-input').value = event.results[0][0].transcript;
                micBtn.innerText = '🎙️';
                sendMessage();
            };
            recognition.onerror = () => micBtn.innerText = '🎙️';
            recognition.start();
        }
    </script>
</body>
</html>
