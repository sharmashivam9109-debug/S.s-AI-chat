<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.s AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;overflow:hidden}
#sidebar{width:260px;background:#111118;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;transition:0.3s}
#sidebar.hidden{width:0;overflow:hidden}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.brand{text-align:center;margin-bottom:12px}
.brand h2{font-size:16px;font-weight:700;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand p{font-size:10px;color:#475569;margin-top:2px}
#new-chat-btn{width:100%;padding:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:10px;color:#fff;font-size:14px;cursor:pointer;font-weight:500}
#chat-history{flex:1;overflow-y:auto;padding:10px}
.history-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#94a3b8;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:0.2s}
.history-item:hover{background:rgba(255,255,255,0.06);color:#e2e8f0}
.history-item.active{background:rgba(124,58,237,0.2);color:#a855f7}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.06);text-align:center}
.sidebar-footer p{font-size:10px;color:#334155}
.sidebar-footer span{color:#7c3aed}
#clear-btn{width:100%;margin-bottom:8px;padding:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:#f87171;font-size:13px;cursor:pointer}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#header{padding:12px 16px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px}
#toggle-sidebar{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer}
.header-center{flex:1;display:flex;align-items:center;gap:10px}
.header-avatar{width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.header-info h1{font-size:15px;font-weight:600}
.header-info p{font-size:11px;color:#10b981}
.header-badge{margin-left:auto;font-size:11px;color:#475569;text-align:right}
.header-badge span{color:#7c3aed;font-weight:500}
#chat-wrap{flex:1;overflow-y:auto;display:flex;flex-direction:column}
#chat-box{flex:1;padding:20px;display:flex;flex-direction:column;gap:20px;max-width:800px;width:100%;margin:0 auto}
#chat-box::-webkit-scrollbar{width:4px}
#chat-box::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:4px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#475569}
.empty-logo{font-size:52px;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.empty-state h2{font-size:22px;color:#94a3b8;font-weight:600}
.empty-state p{font-size:13px;color:#334155}
.prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.prompt-chip{padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;font-size:13px;cursor:pointer;transition:0.2s;color:#94a3b8}
.prompt-chip:hover{background:rgba(124,58,237,0.2);border-color:#7c3aed;color:#e2e8f0}
.msg-wrap{display:flex;gap:10px;align-items:flex-start}
.msg-wrap.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.user .avatar{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.ai .avatar{background:#1e1e2e;border:1px solid rgba(255,255,255,0.1);color:#a855f7}
.msg{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.user .msg{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-top-right-radius:4px}
.ai .msg{background:#13131f;border:1px solid rgba(255,255,255,0.07);border-top-left-radius:4px}
.ai .msg h1,.ai .msg h2,.ai .msg h3{color:#a855f7;margin:10px 0 6px}
.ai .msg p{margin-bottom:8px}
.ai .msg ul,.ai .msg ol{padding-left:20px;margin-bottom:8px}
.ai .msg pre{position:relative;margin:10px 0;border-radius:8px;overflow:hidden}
.ai .msg pre code{font-size:13px}
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;background:rgba(255,255,255,0.1);border:none;border-radius:6px;color:#e2e8f0;font-size:11px;cursor:pointer}
.copy-btn:hover{background:rgba(124,58,237,0.4)}
.msg-actions{display:flex;gap:6px;margin-top:6px;opacity:0;transition:0.2s}
.msg-wrap:hover .msg-actions{opacity:1}
.action-btn{padding:4px 8px;background:rgba(255,255,255,0.05);border:none;border-radius:6px;color:#94a3b8;font-size:11px;cursor:pointer}
.action-btn:hover{background:rgba(124,58,237,0.2);color:#a855f7}
.typing{display:flex;gap:4px;padding:12px 16px;background:#13131f;border-radius:16px;border-top-left-radius:4px;border:1px solid rgba(255,255,255,0.07)}
.typing span{width:6px;height:6px;background:#7c3aed;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#input-area{padding:16px;border-top:1px solid rgba(255,255,255,0.06);max-width:800px;width:100%;margin:0 auto}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#13131f;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:10px 14px;transition:0.2s}
.input-box:focus-within{border-color:#7c3aed}
#msg-input{flex:1;background:none;border:none;color:#f1f5f9;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5}
#msg-input::placeholder{color:#475569}
#send-btn{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;transition:0.2s}
#send-btn:hover{transform:scale(1.05)}
.hint{text-align:center;font-size:11px;color:#334155;margin-top:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:600px){#sidebar{position:absolute;z-index:100;height:100%}#sidebar.hidden{left:-260px;width:260px}}
</style>
</head>
<body>
<div id="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <h2>✦ S.s AI</h2>
      <p>Made with ♥ by Shivam</p>
    </div>
    <button id="new-chat-btn">+ New Chat</button>
  </div>
  <div id="chat-history"></div>
  <div class="sidebar-footer">
    <button id="clear-btn">🗑 Clear All</button>
    <p>© 2026 <span>S.s AI</span> · By Shivam</p>
  </div>
</div>
<div id="main">
  <div id="header">
    <button id="toggle-sidebar">☰</button>
    <div class="header-center">
      <div class="header-avatar">✦</div>
      <div class="header-info">
        <h1>S.s AI</h1>
        <p>● Online</p>
      </div>
    </div>
    <div class="header-badge">Made by <span>Shivam</span></div>
  </div>
  <div id="chat-wrap">
    <div id="chat-box"></div>
  </div>
  <div id="input-area">
    <div class="input-box">
      <textarea id="msg-input" rows="1" placeholder="Message S.s AI..."></textarea>
      <button id="send-btn">➤</button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for new line · S.s AI by Shivam</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const chatBox=document.getElementById('chat-box');
const input=document.getElementById('msg-input');
const btn=document.getElementById('send-btn');
const historyEl=document.getElementById('chat-history');
let sessions=[],currentId=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function showEmpty(){chatBox.innerHTML=`<div class="empty-state"><div class="empty-logo">✦</div><h2>S.s AI se kuch pucho</h2><p>Made by Shivam · Powered by Groq</p><div class="prompts"><div class="prompt-chip" onclick="usePrompt(this)">Quantum Physics explain karo</div><div class="prompt-chip" onclick="usePrompt(this)">Python mein loop likhdo</div><div class="prompt-chip" onclick="usePrompt(this)">Anime recommend karo</div><div class="prompt-chip" onclick="usePrompt(this)">Japan ke baare mein batao</div></div></div>`}
function usePrompt(el){input.value=el.textContent;input.focus()}
function renderHistory(){historyEl.innerHTML='';sessions.forEach(s=>{const d=document.createElement('div');d.className='history-item'+(s.id===currentId?' active':'');d.textContent=s.title;d.onclick=()=>loadSession(s.id);historyEl.appendChild(d)})}
function newChat(){currentId=Date.now();sessions.unshift({id:currentId,title:'New Chat',messages:[]});renderHistory();showEmpty()}
function loadSession(id){currentId=id;const s=sessions.find(x=>x.id===id);chatBox.innerHTML='';if(!s.messages.length){showEmpty();return}s.messages.forEach(m=>appendMsg(m.role,m.content,false));renderHistory()}
function getSession(){return sessions.find(x=>x.id===currentId)}
function appendMsg(role,content,save=true){
  const wrap=document.createElement('div');wrap.className=`msg-wrap ${role}`;
  const av=document.createElement('div');av.className='avatar';av.textContent=role==='user'?'S':'✦';
  const inner=document.createElement('div');
  const msgDiv=document.createElement('div');msgDiv.className='msg';
  if(role==='ai'){msgDiv.innerHTML=marked.parse(content);msgDiv.querySelectorAll('pre code').forEach(b=>{hljs.highlightElement(b);const cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';cb.onclick=()=>{navigator.clipboard.writeText(b.textContent);showToast('Copied!')};b.parentElement.appendChild(cb)})}
  else{msgDiv.textContent=content}
  const actions=document.createElement('div');actions.className='msg-actions';
  if(role==='ai'){actions.innerHTML='<button class="action-btn" onclick="regenerate()">↺ Regenerate</button>'}
  actions.innerHTML+='<button class="action-btn" onclick="copyMsg(this)">📋 Copy</button>';
  inner.appendChild(msgDiv);inner.appendChild(actions);
  wrap.appendChild(av);wrap.appendChild(inner);
  chatBox.appendChild(wrap);chatBox.scrollTop=chatBox.scrollHeight;
  if(save){const s=getSession();if(s){s.messages.push({role,content});if(s.messages.length===1)s.title=content.slice(0,30);renderHistory()}}
}
function copyMsg(btn){const msg=btn.closest('.msg-wrap').querySelector('.msg');navigator.clipboard.writeText(msg.textContent);showToast('Copied!')}
let lastPrompt='';
async function regenerate(){if(!lastPrompt)return;const s=getSession();if(s){s.messages.pop();chatBox.lastElementChild?.remove()}await sendMsg(lastPrompt,false)}
async function sendMsg(text,saveUser=true){
  if(!text.trim())return;lastPrompt=text;
  chatBox.querySelector('.empty-state')?.remove();
  if(saveUser)appendMsg('user',text);
  const tw=document.createElement('div');tw.className='msg-wrap ai';tw.id='typing';tw.innerHTML='<div class="avatar">✦</div><div class="typing"><span></span><span></span><span></span></div>';
  chatBox.appendChild(tw);chatBox.scrollTop=chatBox.scrollHeight;
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const data=await res.json();
    document.getElementById('typing')?.remove();
    appendMsg('ai',data.reply);
  }catch(e){document.getElementById('typing')?.remove();showToast('⚠️ API Error!')}
}
btn.onclick=()=>{sendMsg(input.value);input.value='';input.style.height='auto'};
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();btn.click()}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'});
document.getElementById('new-chat-btn').onclick=newChat;
document.getElementById('clear-btn').onclick=()=>{sessions=[];newChat()};
document.getElementById('toggle-sidebar').onclick=()=>document.getElementById('sidebar').classList.toggle('hidden');
newChat();
</script>
</body>
</html>
